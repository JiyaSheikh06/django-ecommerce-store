<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}MyShop{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

  {% include 'navbar.html' %}

  <!-- Messages -->
  {% if messages %}
  <div class="max-w-4xl mx-auto w-full px-4 pt-4">
    {% for message in messages %}
    <div class="border px-4 py-2 rounded mb-2 text-sm
      {% if message.tags == 'error' %}border-red-400 bg-red-50 text-red-700
      {% elif message.tags == 'success' %}border-green-400 bg-green-50 text-green-700
      {% else %}border-blue-400 bg-blue-50 text-blue-700{% endif %}">
      {{ message }}
    </div>
    {% endfor %}
  </div>
  {% endif %}

  <!-- Content -->
  <main class="flex-1 max-w-4xl mx-auto w-full px-4 py-6">
    {% block content %}{% endblock %}
  </main>

  {% include 'footer.html' %}

</body>
</html>
