{% extends 'base.html' %}
{% block title %}Register — MyShop{% endblock %}

{% block content %}

<div class="max-w-sm mx-auto mt-10">
  <h1 class="text-2xl font-bold mb-6">Create Account</h1>

  <form method="POST" action="" class="space-y-4">
    {% csrf_token %}

    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-sm mb-1">First Name</label>
        <input type="text" name="first_name"
          class="w-full border border-gray-300 rounded px-3 py-2 text-sm" />
      </div>
      <div>
        <label class="block text-sm mb-1">Last Name</label>
        <input type="text" name="last_name"
          class="w-full border border-gray-300 rounded px-3 py-2 text-sm" />
      </div>
    </div>

    <div>
      <label class="block text-sm mb-1">Username</label>
      <input type="text" name="username" required
        class="w-full border border-gray-300 rounded px-3 py-2 text-sm" />
    </div>

    <div>
      <label class="block text-sm mb-1">Email</label>
      <input type="email" name="email" required
        class="w-full border border-gray-300 rounded px-3 py-2 text-sm" />
    </div>

    <div>
      <label class="block text-sm mb-1">Password</label>
      <input type="password" name="password1" required
        class="w-full border border-gray-300 rounded px-3 py-2 text-sm" />
    </div>

    <div>
      <label class="block text-sm mb-1">Confirm Password</label>
      <input type="password" name="password2" required
        class="w-full border border-gray-300 rounded px-3 py-2 text-sm" />
    </div>

    <button type="submit"
      class="w-full bg-gray-800 text-white py-2 rounded hover:bg-gray-700 text-sm font-semibold">
      Register
    </button>
  </form>

  <p class="text-sm text-gray-500 mt-4 text-center">
    Already have an account? <a href="/accounts/login/" class="text-blue-600 hover:underline">Login</a>
  </p>
</div>

{% endblock %}
